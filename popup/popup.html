<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Ctrl+P Settings</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>No Ctrl+P</h1>
            <p>Manage print shortcut</p>
        </header>
        
        <div class="control-group">
            <div class="labels">
                <label for="blocker">Block shortcut</label>
                <span id="status">On</span>
            </div>
            <label class="toggle">
                <input type="checkbox" id="blocker" checked>
                <span class="track"></span>
            </label>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
